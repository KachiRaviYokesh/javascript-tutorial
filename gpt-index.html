<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Q&A</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: #121212;
            color: #e0e0e0;
            max-width: 100vw
        }

        .header {
            background: #1e1e1e;
            border-bottom: 1px solid #2a2a2a;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: 42px;
            display: flex;
            align-items: center
        }

        .header-inner {
            max-width: 880px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0
        }

        .header input {
            flex: 1;
            padding: 6px 12px;
            border: 1px solid #333;
            border-radius: 6px;
            font-size: .88rem;
            font-family: 'Poppins', sans-serif;
            outline: none;
            background: #2a2a2a;
            color: #e0e0e0;
            min-width: 0
        }

        .header input::placeholder {
            color: #777
        }

        .header input:focus {
            border-color: #555
        }

        .header select {
            padding: 6px 8px;
            border: 1px solid #333;
            border-radius: 6px;
            font-size: .88rem;
            font-family: 'Poppins', sans-serif;
            outline: none;
            background: #2a2a2a;
            color: #e0e0e0;
            cursor: pointer;
            width: 180px;
        }

        .content {
            position: fixed;
            top: 42px;
            bottom: 0;
            left: 0;
            right: 0;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 10px
        }

        .content::-webkit-scrollbar {
            width: 6px
        }

        .content::-webkit-scrollbar-track {
            background: #1a1a1a
        }

        .content::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px
        }

        .content-inner {
            max-width: 880px;
            margin: 0 auto;
            overflow: hidden
        }

        .qa-card {
            padding: 14px 0;
            border-bottom: 1px solid #2a2a2a
        }

        .qa-card:last-child {
            border-bottom: none
        }

        .question {
            font-weight: 600;
            font-size: .95rem;
            margin-bottom: 5px;
            color: #fff
        }

        .answer {
            font-size: .88rem;
            color: #aaa;
            line-height: 1.65
        }

        .answer pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 12px 14px;
            border-radius: 6px;
            overflow-x: auto;
            margin-top: 5px;
            font-size: .82rem;
            line-height: 1.6;
            border: 1px solid #2a2a2a;
            font-family: 'Consolas', 'Courier New', monospace;
            max-width: 100%;
            box-sizing: border-box
        }

        .answer pre .kw {
            color: #569cd6
        }

        .answer pre .fn {
            color: #dcdcaa
        }

        .answer pre .str {
            color: #ce9178
        }

        .answer pre .num {
            color: #b5cea8
        }

        .answer pre .cmt {
            color: #6a9955;
            font-style: italic
        }

        .answer pre .type {
            color: #4ec9b0
        }

        .answer pre .dec {
            color: #c586c0
        }

        .answer pre .op {
            color: #d4d4d4
        }

        .answer pre .param {
            color: #9cdcfe
        }

        .answer pre .prop {
            color: #9cdcfe
        }

        .answer pre .tag {
            color: #808080
        }

        .answer pre .attr {
            color: #92d3f5
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-size: 1rem
        }

        mark {
            background: #665500;
            color: #ffe066;
            padding: 0 2px;
            border-radius: 2px
        }

        @media(max-width:600px) {
            .header {
                padding: 5px 6px;
                gap: 6px;
                height: 38px
            }

            .header input,
            .header select {
                font-size: .75rem;
                padding: 5px 8px
            }

            .header select {
                width: 150px
            }

            .content {
                top: 38px;
                padding: 0px
            }

            .qa-card {
                padding: 8px 12px
            }

            .question {
                font-size: .82rem;
                margin-bottom: 3px
            }

            .answer {
                font-size: .76rem;
                line-height: 1.55
            }

            .answer pre {
                font-size: .68rem;
                padding: 8px 10px;
                line-height: 1.5;
                white-space: pre-wrap;
                word-wrap: break-word;
                overflow-wrap: break-word;
                overflow-x: hidden;
                max-width: 100%
            }

            .no-results {
                font-size: .85rem
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-inner">
            <input type="text" id="searchBox" placeholder="Search...">
            <select id="filterSelect">
                <option value="all">All</option>
                <option value="js">JavaScript</option>
                <option value="ts">TypeScript</option>
                <option value="ng">Angular</option>
                <option value="rxjs">RxJS</option>
                <option value="sm">State Management</option>
            </select>
        </div>
    </div>

    <div class="content">
        <div class="content-inner" id="container"></div>
    </div>

    <script>
        const jsData = [
            { q: "1. What is JavaScript?", a: `JavaScript is a high level programming language used to create interactive web pages. It runs inside the browser and helps to handle user actions, update UI dynamically, and communicate with backend services using APIs.\n<pre>console.log("Hello JavaScript");</pre>` },
            { q: "2. What are variables?", a: `Variables are containers used to store data values in memory. They help to reuse and manage data throughout the program and make the code more readable and maintainable.\n<pre>let name = "Ram";</pre>` },
            { q: "3. Difference between var, let and const?", a: `var is function scoped and can be redeclared, which may create issues. let is block scoped and safer. const is also block scoped but cannot be reassigned after initial value.\n<pre>let a = 10; const b = 20;</pre>` },
            { q: "4. What is data type?", a: `Data type defines the type of value stored in a variable like number, string, boolean, object or undefined. It helps JavaScript understand how to process that value properly.\n<pre>let num = 10; let str = "hi";</pre>` },
            { q: "5. What is typeof operator?", a: `typeof is used to check the data type of a variable at runtime. It is useful during debugging and validation of values before performing operations.\n<pre>typeof 10; // number</pre>` },
            { q: "6. What is a function?", a: `Function is a reusable block of code that performs a specific task. It helps reduce code duplication and improves readability and maintainability.\n<pre>function greet(){ return "Hello"; }</pre>` },
            { q: "7. What is arrow function?", a: `Arrow function is a shorter way to write functions. It is useful for small functions and does not have its own this keyword, which avoids confusion.\n<pre>const add = (a,b)=>a+b;</pre>` },
            { q: "8. What is array?", a: `Array is a collection of multiple values stored in a single variable. It is useful when working with lists like numbers, users, or items.\n<pre>let arr = [1,2,3];</pre>` },
            { q: "9. What is object?", a: `Object is a collection of key-value pairs used to store structured data. It helps represent real-world entities like user, product or settings.\n<pre>let user = {name:"Ram"};</pre>` },
            { q: "10. What is undefined?", a: `Undefined means a variable is declared but not assigned any value. It is the default value given by JavaScript engine when no value is set.\n<pre>let a; console.log(a);</pre>` },
            { q: "11. What is null?", a: `Null is an assigned value which represents empty or no value. It is used when we want to intentionally clear or reset a variable.\n<pre>let a = null;</pre>` },
            { q: "12. What is NaN?", a: `NaN means Not a Number and appears when a mathematical operation fails or is invalid. It is still considered a number type in JavaScript.\n<pre>console.log("a"*2);</pre>` },
            { q: "13. Difference between == and ===?", a: `Double equals checks only values with type conversion, while triple equals checks both value and type. It is always better to use === to avoid unexpected results.\n<pre>10 == "10"; // true\n10 === "10"; // false</pre>` },
            { q: "14. What is loop?", a: `Loop is used to execute a block of code multiple times based on a condition. It reduces repetition and helps in working with arrays and data sets.\n<pre>for(let i=0;i<3;i++){ console.log(i); }</pre>` },
            { q: "15. Types of loops?", a: `Common loops in JavaScript are for, while, and do-while. Each loop is used based on requirement and readability of the code logic.\n<pre>let i=0; while(i<2){ i++; }</pre>` },
            { q: "16. What is if-else?", a: `If-else statement is used for decision making in programs. It executes different blocks of code based on given condition.\n<pre>if(a>10){ console.log("big"); }</pre>` },
            { q: "17. What is callback function?", a: `Callback is a function passed as argument to another function and executed later. It is commonly used in asynchronous operations like events and API calls.\n<pre>function test(fn){ fn(); }</pre>` },
            { q: "18. What is closure?", a: `Closure is when an inner function can access variables from its outer function even after the outer function execution is completed.\n<pre>function outer(){ let a=1; return ()=>a; }</pre>` },
            { q: "19. What is hoisting?", a: `Hoisting is JavaScript behavior where variable and function declarations are moved to top of scope before execution. Only declarations are hoisted, not values.\n<pre>console.log(a); var a=5;</pre>` },
            { q: "20. What is scope?", a: `Scope defines where a variable can be accessed in the code. It helps control visibility and lifetime of variables.\n<pre>let a=1;</pre>` },
            { q: "21. What is global scope?", a: `Global scope variables can be accessed anywhere in the program. Overusing global variables may create conflicts in large applications.\n<pre>var a=10;</pre>` },
            { q: "22. What is local scope?", a: `Local scope variables are accessible only inside a function or block. It helps protect data and avoid unwanted access.\n<pre>function x(){ let a=5; }</pre>` },
            { q: "23. What is DOM?", a: `DOM is Document Object Model which represents HTML structure as a tree. JavaScript uses DOM to access and update content dynamically.\n<pre>document.title = "JS";</pre>` },
            { q: "24. What is event?", a: `Event is an action like click, input or scroll performed by user or browser. JavaScript can listen and respond to these events.\n<pre>button.onclick=()=>{};</pre>` },
            { q: "25. What is event listener?", a: `Event listener is used to attach a function to an event so that it executes when the event happens. It supports multiple handlers.\n<pre>btn.addEventListener("click",fn);</pre>` },
            {
                q: "26. What is addEventListener?", a: `addEventListener is used to attach an event to an HTML element. It allows multiple event handlers and gives better control compared to inline events.\n<pre>btn.addEventListener(
  "click",
  ()=>console.log("clicked"));</pre>`},
            { q: "27. What is this keyword?", a: `this keyword refers to the current object depending on how the function is called. In global scope, it refers to window object in browser.\n<pre>console.log(this);</pre>` },
            { q: "28. What is strict mode?", a: `Strict mode is used to write safer JavaScript code. It prevents common mistakes like using undeclared variables and improves debugging.\n<pre>"use strict";</pre>` },
            { q: "29. What is JSON?", a: `JSON stands for JavaScript Object Notation. It is a simple format used to store and transfer data between client and server.\n<pre>let obj = {"name":"Ram"};</pre>` },
            { q: "30. What is JSON.parse?", a: `JSON.parse converts JSON string into JavaScript object. It is used when receiving data from server.\n<pre>JSON.parse('{"a":1}');</pre>` },
            { q: "31. What is JSON.stringify?", a: `JSON.stringify converts JavaScript object into JSON string. It is used when sending data to server.\n<pre>JSON.stringify({a:1});</pre>` },
            { q: "32. What is Promise?", a: `Promise is used to handle asynchronous operations. It represents a value that will be available now, later, or never.\n<pre>new Promise((res)=>res());</pre>` },
            { q: "33. What is async function?", a: `Async function is used to write asynchronous code in a simple way. It always returns a promise automatically.\n<pre>async function test(){ return 1; }</pre>` },
            { q: "34. What is await?", a: `await is used inside async function to wait for promise result. It makes code look like synchronous.\n<pre>await fetch(url);</pre>` },
            { q: "35. What is setTimeout?", a: `setTimeout is used to execute a function after a delay in milliseconds. It runs only once after delay.\n<pre>setTimeout(()=>console.log("hi"),1000);</pre>` },
            { q: "36. What is setInterval?", a: `setInterval is used to execute a function repeatedly after a fixed time interval until stopped.\n<pre>setInterval(()=>console.log("run"),1000);</pre>` },
            {
                q: "37. What is clearTimeout?", a: `clearTimeout is used to cancel a timeout set by setTimeout before it executes.\n<pre>let id=setTimeout(()=>{},1000);
clearTimeout(id);</pre>`},
            {
                q: "38. What is clearInterval?", a: `clearInterval is used to stop the repeated execution started by setInterval function.\n<pre>let id=setInterval(()=>{},1000);
clearInterval(id);</pre>`},
            { q: "39. What is fetch API?", a: `Fetch API is used to make HTTP requests to get or send data to server. It returns a promise.\n<pre>fetch(url).then(res=>res.json());</pre>` },
            { q: "40. What is try catch?", a: `try catch is used to handle runtime errors in JavaScript. It prevents program crash and handles errors gracefully.\n<pre>try{} catch(e){ console.log(e); }</pre>` },
            { q: "41. What is localStorage?", a: `localStorage is used to store data in browser permanently. Data remains even after page reload or browser restart.\n<pre>localStorage.setItem("a",1);</pre>` },
            { q: "42. What is sessionStorage?", a: `sessionStorage stores data temporarily for a single tab session. Data is cleared when tab is closed.\n<pre>sessionStorage.setItem("a",1);</pre>` },
            { q: "43. What is map()?", a: `map method creates a new array by modifying each element of original array. It does not change original array.\n<pre>[1,2].map(x=>x*2);</pre>` },
            { q: "44. What is filter()?", a: `filter method returns a new array with elements that match a condition. It is useful for selecting data.\n<pre>[1,2,3].filter(x=>x>1);</pre>` },
            { q: "45. What is reduce()?", a: `reduce method converts array into single value using accumulator logic. It is useful for calculations.\n<pre>[1,2].reduce((a,b)=>a+b);</pre>` },
            { q: "46. What is forEach()?", a: `forEach is used to loop through array elements. It executes function for each item but does not return new array.\n<pre>[1,2].forEach(x=>console.log(x));</pre>` },
            { q: "47. What is spread operator?", a: `Spread operator is used to expand array or object values. It is useful for copying and merging data.\n<pre>let b=[...a];</pre>` },
            { q: "48. What is rest operator?", a: `Rest operator collects multiple values into a single array parameter in function arguments.\n<pre>function x(...a){}</pre>` },
            { q: "49. What is destructuring?", a: `Destructuring is used to extract values from arrays or objects into variables in simple way.\n<pre>let {a}={a:1};</pre>` },
            { q: "50. What is template literal?", a: "Template literal is used to create strings using backticks and allows variable interpolation inside string.\n<pre>`Hello ${name}`</pre>" },
            { q: "51. What is execution context?", a: `Execution context is the environment where JavaScript code runs. It contains variables, functions, and scope information. There are global and function execution contexts created during program execution.\n<pre>console.log("Execution starts");</pre>` },
            { q: "52. What is call stack?", a: `Call stack is a data structure which keeps track of function calls. It follows Last In First Out order, meaning the last function added is executed first.\n<pre>function a(){b()} function b(){} a();</pre>` },
            { q: "53. What is event loop?", a: `Event loop is responsible for handling asynchronous operations. It continuously checks call stack and callback queue and pushes tasks to stack when it is empty.\n<pre>setTimeout(()=>console.log("hi"),0);</pre>` },
            { q: "54. What is callback queue?", a: `Callback queue stores functions from asynchronous operations like setTimeout. Event loop pushes these callbacks into call stack when it is free.\n<pre>setTimeout(()=>{},1000);</pre>` },
            { q: "55. What is microtask queue?", a: `Microtask queue stores promise callbacks and has higher priority than callback queue. It executes before moving to next event loop cycle.\n<pre>Promise.resolve().then(()=>{});</pre>` },
            {
                q: "56. What is closure in real usage?", a: `Closure helps to maintain private variables and state. It is used in scenarios like data hiding and function factories in real applications.\n<pre>function counter(){let c=0;
return ()=>++c;}</pre>`},
            { q: "57. What is hoisting in detail?", a: `Hoisting moves variable and function declarations to top of scope. var is hoisted with undefined, while let and const are hoisted but not initialized.\n<pre>console.log(a); var a=5;</pre>` },
            { q: "58. What is temporal dead zone?", a: `Temporal Dead Zone is the time between variable declaration and initialization where accessing let or const variables throws error.\n<pre>console.log(a); let a=5;</pre>` },
            { q: "59. What is shallow copy?", a: `Shallow copy copies only first level properties and nested objects are still referenced. Changes in nested objects affect original object.\n<pre>let b={...a};</pre>` },
            { q: "60. What is deep copy?", a: `Deep copy creates completely independent copy including nested objects. Changes in copied object will not affect original object.\n<pre>JSON.parse(JSON.stringify(obj));</pre>` },
            { q: "61. What is prototype?", a: `Prototype is an object from which other objects inherit properties. Every JavaScript object has a prototype chain internally.\n<pre>obj.__proto__;</pre>` },
            { q: "62. What is prototype chain?", a: `Prototype chain is the process of looking up properties in parent objects if not found in current object.\n<pre>obj.toString();</pre>` },
            { q: "63. What is bind() method?", a: `bind method returns a new function with fixed this value. It does not execute immediately but can be called later.\n<pre>fn.bind(obj);</pre>` },
            { q: "64. What is call() method?", a: `call method invokes function immediately and sets this value. Arguments are passed individually.\n<pre>fn.call(obj);</pre>` },
            { q: "65. What is apply() method?", a: `apply method is similar to call but arguments are passed as array. It is useful when arguments are dynamic.\n<pre>fn.apply(obj,[1,2]);</pre>` },
            { q: "66. What is currying?", a: `Currying converts a function with multiple arguments into multiple functions with single argument. It improves reusability.\n<pre>const add=a=>b=>a+b;</pre>` },
            { q: "67. What is IIFE?", a: `Immediately Invoked Function Expression executes immediately after creation. It is used to avoid global scope pollution.\n<pre>(function(){})();</pre>` },
            { q: "68. What is pure function?", a: `Pure function always returns same output for same input and does not change external state. It makes code predictable.\n<pre>a=>a*2;</pre>` },
            { q: "69. What is impure function?", a: `Impure function depends on external variables or modifies state. It may return different outputs for same input.\n<pre>count++;</pre>` },
            { q: "70. What is higher order function?", a: `Higher order function takes another function as argument or returns a function. It is widely used in functional programming.\n<pre>arr.map(x=>x);</pre>` },
            { q: "71. What is debouncing?", a: `Debouncing delays execution until user stops triggering event. It is useful in search input to reduce API calls.\n<pre>setTimeout(fn,300);</pre>` },
            { q: "72. What is throttling?", a: `Throttling limits function execution to once in given interval. It is useful in scroll and resize events.\n<pre>if(!flag){fn();}</pre>` },
            { q: "73. What is event delegation?", a: `Event delegation uses parent element to handle events for child elements. It improves performance and reduces memory usage.\n<pre>parent.onclick=fn;</pre>` },
            { q: "74. What is preventDefault?", a: `preventDefault stops default browser behavior like form submit or link navigation. It is used in form handling.\n<pre>e.preventDefault();</pre>` },
            { q: "75. What is stopPropagation?", a: `stopPropagation stops event from bubbling to parent elements. It controls event flow in DOM tree.\n<pre>e.stopPropagation();</pre>` },
            { q: "76. What is event bubbling?", a: `Event bubbling is a process where event starts from target element and moves up to parent elements. It is default behavior in JavaScript event handling system.\n<pre>div.onclick=()=>console.log("parent");</pre>` },
            { q: "77. What is event capturing?", a: `Event capturing is opposite of bubbling where event travels from parent to child element. It happens before bubbling phase when enabled.\n<pre>addEventListener("click",fn,true);</pre>` },
            { q: "78. Difference between bubbling and capturing?", a: `Bubbling moves from child to parent, capturing moves from parent to child. By default, JavaScript uses bubbling unless capturing is explicitly enabled.\n<pre>addEventListener("click",fn,true);</pre>` },
            {
                q: "79. What is once event listener?", a: `Once event listener runs only one time and then automatically removes itself. It is useful for one-time actions like initial setup.\n<pre>btn.addEventListener(
  "click", fn,
  {once:true});</pre>`},
            {
                q: "80. What is passive event listener?", a: `Passive event listener improves performance by telling browser that event will not call preventDefault. It is useful for scroll events.\n<pre>addEventListener(
  "scroll", fn,
  {passive:true});</pre>`},
            { q: "81. What is object.freeze()?", a: `Object.freeze makes an object immutable. It prevents adding, deleting, or modifying properties, but nested objects can still be changed.\n<pre>Object.freeze(obj);</pre>` },
            { q: "82. What is Object.seal()?", a: `Object.seal prevents adding or deleting properties but allows modification of existing properties in the object.\n<pre>Object.seal(obj);</pre>` },
            { q: "83. Difference between freeze and seal?", a: `freeze completely locks object, while seal allows modifying existing properties but does not allow adding or removing properties.\n<pre>Object.freeze(obj);</pre>` },
            { q: "84. What is optional chaining?", a: `Optional chaining allows safe access of nested object properties without throwing error if property is undefined or null.\n<pre>obj?.a?.b;</pre>` },
            { q: "85. What is nullish coalescing operator?", a: `Nullish coalescing returns right side value only when left side is null or undefined. It is safer than logical OR in some cases.\n<pre>a ?? b;</pre>` },
            { q: "86. What is short circuiting?", a: `Short circuiting means logical operators stop evaluating when result is determined. It is commonly used for default values.\n<pre>a && console.log(a);</pre>` },
            { q: "87. What is type coercion?", a: `Type coercion is automatic conversion of one data type to another during operations. It can lead to unexpected results if not handled carefully.\n<pre>"5" + 1;</pre>` },
            { q: "88. What is implicit coercion?", a: `Implicit coercion happens automatically when JavaScript converts types during operations like comparison or addition.\n<pre>"5" + 1; // "51"</pre>` },
            { q: "89. What is explicit coercion?", a: `Explicit coercion is manual conversion of data types using functions like Number, String, or Boolean.\n<pre>Number("5");</pre>` },
            { q: "90. What is array destructuring?", a: `Array destructuring allows extracting values from array into variables in a simple and readable way.\n<pre>let [a,b]=[1,2];</pre>` },
            { q: "91. What is object destructuring default value?", a: `Object destructuring allows assigning default values if property is not present in object.\n<pre>let {a=10} = {};</pre>` },
            { q: "92. What is computed property name?", a: `Computed property allows using dynamic values as object keys using square brackets.\n<pre>let obj = {[key]:"value"};</pre>` },
            { q: "93. What is Symbol data type?", a: `Symbol is a unique and immutable data type used as object keys. It helps avoid property name conflicts.\n<pre>let id = Symbol("id");</pre>` },
            { q: "94. What is BigInt?", a: `BigInt is used to store very large numbers beyond safe integer limit of JavaScript numbers.\n<pre>let n = 12345678901234567890n;</pre>` },
            { q: "95. What is Array.isArray()?", a: `Array.isArray checks whether a given value is an array. It is more reliable than typeof for arrays.\n<pre>Array.isArray([]);</pre>` },
            { q: "96. What is find() method?", a: `find method returns first element in array that matches condition. If no match found, it returns undefined.\n<pre>[1,2,3].find(x=>x>1);</pre>` },
            { q: "97. What is some() method?", a: `some method checks if at least one element satisfies condition and returns true or false.\n<pre>[1,2].some(x=>x>1);</pre>` },
            { q: "98. What is every() method?", a: `every method checks if all elements satisfy condition. It returns true only if all elements match.\n<pre>[1,2].every(x=>x>0);</pre>` },
            { q: "99. What is includes() method?", a: `includes method checks whether array contains a specific value and returns true or false.\n<pre>[1,2,3].includes(2);</pre>` },
            { q: "100. What is flat() method?", a: `flat method is used to flatten nested arrays into single level array. Depth can be specified if needed.\n<pre>[1,[2,3]].flat();</pre>` },
            {
                q: "101. What is event loop in depth?", a: `Event loop manages execution of synchronous and asynchronous code. It continuously checks call stack and moves tasks from microtask and callback queue when stack is empty. Microtasks are executed before macrotasks for better priority handling.\n<pre>Promise.resolve()
  .then(()=>
    console.log("micro")
  );</pre>`},
            { q: "102. Difference between microtask and macrotask?", a: `Microtasks include promises and run before rendering, while macrotasks include setTimeout and run after rendering. Microtasks have higher priority and execute immediately after current task completes.\n<pre>setTimeout(()=>{},0);</pre>` },
            { q: "103. What is repaint and reflow?", a: `Reflow recalculates layout when DOM structure changes, while repaint updates visual styles like color. Reflow is expensive and should be minimized for better performance.\n<pre>el.style.width="100px";</pre>` },
            { q: "104. What is memory leak?", a: `Memory leak happens when unused objects are not garbage collected, causing memory usage to increase continuously. It can slow down application and crash browser.\n<pre>let arr=[];</pre>` },

            { q: "61. How to avoid duplicate API calls?", a: `Use shareReplay, caching in store, or check state before making API call.\n<pre>loadUsers$ = createEffect(() =>\n  this.actions$.pipe(\n    ofType(loadUsers),\n    withLatestFrom(this.store.select(selectLoaded)),\n    filter(([_, loaded]) => !loaded),\n    switchMap(() => this.api.getUsers())\n  )\n);</pre>` },
            {
                q: "62. What is caching strategy in state?", a: `Store API responses in state and reuse them instead of calling API repeatedly.\n<pre>// Check state before API
//  call\nthis.store.select(selectUsers)
  .pipe(\n  take(1),\n  switchMap(users => users.length\n    ? of(users)\n    : this.api.getUsers()\n  )\n);</pre>`},
            {
                q: "63. What is optimistic update real example?", a: `Update UI immediately after action like delete or like button, then sync with server.\n<pre>// Remove from UI
//  immediately\nthis.store.dispatch(removeItem({id}));\n// Then call API\nthis.api.delete(id)
  .pipe(\n  catchError(() => {\n    this.store.dispatch(revertRemove({id}));\n    return EMPTY;\n 
})\n);</pre>`},
            {
                q: "64. What is pessimistic update real example?", a: `Wait for API response before updating UI to ensure data accuracy.\n<pre>this.api.updateUser(data)
  .pipe(\n  tap(updated => {\n    this.store.dispatch(updateSuccess({user: updated}));\n 
}),\n  catchError(err => {\n    this.toast.show('Update failed');\n    return EMPTY;\n 
})\n);</pre>`},
            {
                q: "65. How to handle forms with state?", a: `Use reactive forms with valueChanges and sync with state using actions or signals.\n<pre>this.form.valueChanges.pipe(\n  debounceTime(300)\n)
  .subscribe(val => {\n  this.store.dispatch(updateFormState({val}));\n});</pre>`},
            {
                q: "66. What is state synchronization?", a: `State synchronization keeps UI, backend, and store data consistent.\n<pre>// After API success, update
//  store\nthis.api.save(data)
  .subscribe(res => {\n  this.store.dispatch(saveSuccess({data: res}));\n});</pre>`},
            { q: "67. What is feature state separation?", a: `Divide state into feature modules like user, product, auth for better organization.\n<pre>StoreModule.forFeature('auth', authReducer);\nStoreModule.forFeature('product', productReducer);</pre>` },
            { q: "68. What is global error handling in state?", a: `Use effects to catch API errors and update error state globally.\n<pre>handleError$ = createEffect(() =>\n  this.actions$.pipe(\n    ofType(apiError),\n    tap(({msg}) => this.toast.showError(msg))\n  ), {dispatch: false}\n);</pre>` },
            {
                q: "69. How to debug state issues?", a: `Use Redux DevTools to track actions and state changes step by step.\n<pre>// Install Redux DevTools
//  extension\nStoreDevtoolsModule.instrument({\n  maxAge: 25, logOnly: environment.production\n});\n// See action log and state diff</pre>`},
            {
                q: "70. What is performance issue in state?", a: `Frequent unnecessary updates and large state objects can reduce performance.\n<pre>// BAD: selecting entire
//  state\nstore.select(s => s);\n// GOOD: select only needed slice\nstore.select(selectUserName);</pre>`},
            {
                q: "71. How to optimize state performance?", a: `Use memoized selectors, OnPush strategy, and avoid unnecessary updates.\n<pre>// Memoized selector\nexport const
//  selectTotal = createSelector(\n  selectItems,\n  items => items.reduce((a, b) => a + b.price, 0)\n);</pre>`},
            { q: "72. What is selector composition?", a: `Selectors can be combined to derive complex data from multiple states.\n<pre>const selectUserWithPosts = createSelector(\n  selectUser,\n  selectPosts,\n  (user, posts) => ({...user, posts: posts.filter(p => p.userId === user.id)})\n);</pre>` },
            {
                q: "73. What is state reuse across modules?", a: `Shared modules or global store can be used to reuse state across features.\n<pre>// Global state in
//  root\nStoreModule.forRoot({auth: authReducer});\n// Any module can select\nstore.select(selectCurrentUser);</pre>`},
            { q: "74. What is state reset strategy?", a: `Reset state on logout or navigation to avoid stale data.\n<pre>export const logout = createAction('[Auth] Logout');\non(logout, () => initialState); // reset to default</pre>` },
            {
                q: "75. What is lazy loaded state real usage?", a: `Load feature state only when module is loaded to reduce initial bundle size.\n<pre>// products.module.ts (lazy
//  loaded)\n@NgModule({\n  imports: [\n    StoreModule.forFeature('products', reducer)\n  ]\n})</pre>`},
            {
                q: "76. What is effect chaining?", a: `One effect can trigger another action which triggers another effect.\n<pre>// Effect 1: login -> loginSuccess\n//
//  Effect 2: loginSuccess -> loadProfile\nloadProfile$ = createEffect(() =>\n  this.actions$.pipe(\n    ofType(loginSuccess),\n    switchMap(() => this.api.getProfile())\n  )\n);</pre>`},
            {
                q: "77. What is side effect isolation?", a: `All side effects like API calls should be handled in effects, not in reducers.\n<pre>// BAD: API call in reducer\n// GOOD:
//  API call in effect\nloadData$ = createEffect(() =>\n  this.actions$.pipe(\n    ofType(load),\n    switchMap(() => this.api.getData())\n  )\n);</pre>`},
            { q: "78. What is state hydration real usage?", a: `Load state from localStorage when app initializes.\n<pre>export const hydrate = createAction('[App] Hydrate');\n// On app init, read from localStorage\nconst saved = localStorage.getItem('state');\nif (saved) store.dispatch(hydrate({state: JSON.parse(saved)}));</pre>` },
            {
                q: "79. What is state persistence strategy?", a: `Persist important data like user session in localStorage or sessionStorage.\n<pre>// Save on state
//  change\nstore.select(selectAuth)
  .subscribe(auth => {\n  localStorage.setItem('auth', JSON.stringify(auth));\n});</pre>`},
            {
                q: "80. What is undo/redo in state?", a: `Maintain history of state changes to support undo and redo functionality.\n<pre>interface UndoState {\n  past: State[];
present: State;
future: State[];\n}\n// Undo: move present to future, pop past\n// Redo: move present to past, pop future</pre>`},
            {
                q: "81. What is signals vs NgRx real decision?", a: `Signals are good for simple state, NgRx is better for complex enterprise apps.\n<pre>// Simple counter: use signal\ncount =
//  signal(0);\n// Enterprise app with many features: use NgRx\nStoreModule.forRoot(reducers);</pre>`},
            {
                q: "82. What is hybrid state management?", a: `Use signals for local state and NgRx for global state in same app.\n<pre>// Local UI state\nisOpen =
//  signal(false);\n// Global app state\nusers$ = this.store.select(selectUsers);</pre>`},
            {
                q: "83. What is component store real usage?", a: `ComponentStore manages local component state with RxJS in structured way.\n<pre>@Injectable()\nclass TodoStore extends ComponentStore&lt;TodoState&gt;
{\n  todos$ = this.select(s => s.todos);\n  addTodo = this.updater((s, todo: Todo) => ({\n    ...s, todos: [...s.todos, todo]\n 
}));\n}</pre>`},
            {
                q: "84. What is derived data optimization?", a: `Use selectors or computed signals to calculate data instead of storing it.\n<pre>// Don't store derived data\n// BAD:
//  state.totalPrice\n// GOOD: computed selector\nconst selectTotal = createSelector(\n  selectItems, items => items.reduce((a,b) => a+b.price, 0)\n);</pre>`},
            {
                q: "85. What is state coupling issue?", a: `Tightly coupled state makes code hard to maintain and reuse.\n<pre>// BAD: component directly accesses
//  store internals\nthis.store.select(s => s.user.profile.address.city);\n// GOOD: use facade/selector\nthis.userFacade.city$;</pre>`},
            {
                q: "86. How to decouple state?", a: `Use interfaces, services, and facade pattern to separate logic.\n<pre>// Facade hides store details\nclass
//  CartFacade {\n  items$ = this.store.select(selectCartItems);\n  add(item) {
  this.store.dispatch(addToCart({item}));
}\n}</pre>`},
            {
                q: "87. What is testing state management?", a: `Test reducers, selectors, and effects separately using unit tests.\n<pre>// Test reducer\nconst result =
//  userReducer(\n  initialState,\n  loadUsersSuccess({users: mockUsers})\n);\nexpect(result.users).toEqual(mockUsers);</pre>`},
            { q: "88. What is mocking store?", a: `Mock store is used in testing to simulate state behavior.\n<pre>const store = jasmine.createSpyObj('Store', ['select','dispatch']);\nstore.select.and.returnValue(of(mockData));\nTestBed.configureTestingModule({\n  providers: [{provide: Store, useValue: store}]\n});</pre>` },
            {
                q: "89. What is action naming convention?", a: `Use clear action names like [Feature] ActionName for readability.\n<pre>// Good naming\n'[User] Load
//  Users'\n'[Auth] Login Success'\n'[Cart] Add Item'\n'[Product API] Load Products Failure'</pre>`},
            { q: "90. What is state versioning?", a: `Maintain version of state for migration during updates.\n<pre>interface AppState {\n  version: number;\n  data: any;\n}\n// On load, check version and migrate if needed</pre>` },
            {
                q: "91. What is large data handling in state?", a: `Avoid storing very large data directly, use pagination or caching.\n<pre>interface PaginatedState {\n  items: Item[];
page: number;\n  pageSize: number;
total: number;\n}\n// Load only current page data</pre>`},
            {
                q: "92. What is memory optimization?", a: `Remove unused state and unsubscribe observables properly.\n<pre>// Clear state when leaving
//  module\nngOnDestroy() {\n  this.store.dispatch(clearProducts());\n  this.destroy$.next();\n}</pre>`},
            {
                q: "93. What is selector performance issue?", a: `Non-memoized selectors can cause unnecessary recalculations.\n<pre>// BAD: new reference every
//  time\nstore.select(s => s.users.filter(u => u.active));\n// GOOD: memoized\nconst selectActive = createSelector(\n  selectUsers, users => users.filter(u => u.active)\n);</pre>`},
            {
                q: "94. What is real-time state updates?", a: `Use WebSocket or polling with RxJS to update state in real-time.\n<pre>const socket$ = webSocket('ws://api');\nsocket$.pipe(\n  tap(msg => store.dispatch(newMessage({msg})))\n)
  .subscribe();</pre>`},
            {
                q: "95. What is multi-tab state sync?", a: `Use storage events or service worker to sync state across tabs.\n<pre>window.addEventListener(
  'storage',
  (e) => {\n  if (e.key === 'appState') {\n    store.dispatch(syncState({state: JSON.parse(e.newValue)}));\n 
}\n});</pre>`},
            { q: "96. What is role-based state?", a: `State can change based on user roles like admin or user.\n<pre>const selectMenu = createSelector(\n  selectRole,\n  role => role === 'admin'\n    ? adminMenuItems\n    : userMenuItems\n);</pre>` },
            {
                q: "97. What is security in state?", a: `Avoid storing sensitive data like passwords in state.\n<pre>// NEVER store in state:\n//
//  passwords, credit cards, tokens (use httpOnly cookies)\n// SAFE to store: user name, role, preferences</pre>`},
            {
                q: "98. What is API pagination with state?", a: `Store current page and data in state for pagination.\n<pre>interface PageState {\n  items: Item[];
currentPage: number;
totalPages: number;\n}\non(loadPage, (s, {page}) => ({...s, currentPage: page}));\non(loadPageSuccess, (s, {items}) => ({...s, items}));</pre>`},
            { q: "99. What is filtering with state?", a: `Store filter values and apply selectors to filter data.\n<pre>const selectFiltered = createSelector(\n  selectProducts, selectFilter,\n  (products, filter) => products.filter(\n    p => p.category === filter.category\n  )\n);</pre>` },
            {
                q: "100. What is best architecture for state management?", a: `Use modular structure, facade pattern, immutability, and proper tool selection for scalable applications.\n<pre>// Architecture\n// 1. Feature modules
//  with lazy state\n// 2. Facade services for components\n// 3. Normalized entity state\n// 4. Memoized selectors\n// 5. Effects for side effects</pre>`},
        ];

        // Renumber continuously: JS(1-150), TS(151-300), NG(301-450), RxJS(451-550), SM(551-650)
        function renumber(arr, startNum) {
            return arr.map((d, i) => ({ ...d, q: d.q.replace(/^\d+\./, (startNum + i) + '.') }));
        }
        let offset = 0;
        const allData = [
            ...renumber(jsData, offset + 1).map(d => ({ ...d, cat: 'js' })),
            ...renumber(tsData, (offset += jsData.length) + 1).map(d => ({ ...d, cat: 'ts' })),
            ...renumber(ngData, (offset += tsData.length) + 1).map(d => ({ ...d, cat: 'ng' })),
            ...renumber(rxjsData, (offset += ngData.length) + 1).map(d => ({ ...d, cat: 'rxjs' })),
            ...renumber(smData, (offset += rxjsData.length) + 1).map(d => ({ ...d, cat: 'sm' })),
        ];
        let filter = 'all', search = '';
        function gf() { let r = allData; if (filter !== 'all') r = r.filter(d => d.cat === filter); if (search) { const s = search.toLowerCase(); r = r.filter(d => d.q.toLowerCase().includes(s) || d.a.replace(/<[^>]*>/g, '').toLowerCase().includes(s)); } return r; }
        function hl(t, s) { if (!s) return t; return t.split(/(<[^>]*>)/g).map(p => p.startsWith('<') ? p : p.replace(new RegExp(`(${s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'), '<mark>$1</mark>')).join(''); }

        function syntaxHL(code) {
            // Escape only & for safety, keep existing entities
            let c = code;
            // Tokenize and colorize using VS Code Dark+ palette
            const rules = [
                // Comments (// and /* */)
                [/(\/\/.*?)$/gm, '<span class="cmt">$1</span>'],
                [/(\/\*[\s\S]*?\*\/)/g, '<span class="cmt">$1</span>'],
                // Template literals
                [/(`[^`]*`)/g, '<span class="str">$1</span>'],
                // Strings (double and single quotes)
                [/("(?:[^"\\]|\\.)*")/g, '<span class="str">$1</span>'],
                [/('(?:[^'\\]|\\.)*')/g, '<span class="str">$1</span>'],
                // Decorators (@Component etc)
                [/(@\w+)/g, '<span class="dec">$1</span>'],
                // Numbers
                [/\b(\d+\.?\d*n?)\b/g, '<span class="num">$1</span>'],
                // Keywords (control flow, declarations)
                [/\b(const|let|var|function|return|if|else|for|while|do|switch|case|break|continue|new|typeof|instanceof|in|of|class|extends|super|import|export|from|default|async|await|yield|try|catch|finally|throw|delete|void|this|static|get|set|abstract|override)\b/g, '<span class="kw">$1</span>'],
                // Declaration keywords (purple/pink)
                [/\b(interface|type|enum|namespace|declare|module|implements|readonly|public|private|protected|as|is|keyof|infer)\b/g, '<span class="dec">$1</span>'],
                // Types and built-ins (teal)
                [/\b(string|number|boolean|void|never|any|unknown|null|undefined|true|false|Array|Promise|Object|Map|Set|Date|Error|RegExp|console|document|window|Math|JSON|Symbol|BigInt|Reflect|FormGroup|FormControl|FormArray|Validators|Observable|Subject|BehaviorSubject|ReplaySubject|AsyncSubject|Injectable|Component|NgModule|Pipe|Input|Output|ViewChild|ContentChild|EventEmitter|ChangeDetectorRef|ChangeDetectionStrategy|Router|ActivatedRoute|HttpClient|HttpInterceptor|Store|StoreModule|EffectsModule|ComponentStore|Subscription|EMPTY)\b/g, '<span class="type">$1</span>'],
                // Function calls: word followed by (
                [/\b([a-zA-Z_$][\w$]*)\s*(?=\()/g, '<span class="fn">$1</span>'],
                // Property access after dot
                [/\.([a-zA-Z_$][\w$]*)/g, '.<span class="prop">$1</span>'],
                // Arrow =>
                [/(=&gt;|=>)/g, '<span class="kw">$1</span>'],
                // HTML-like tags in code
                [/(&lt;\/?[\w-]+&gt;)/g, '<span class="tag">$1</span>'],
            ];
            rules.forEach(([regex, rep]) => { c = c.replace(regex, rep); });
            return c;
        }

        function render() {
            const filtered = gf();
            const c = document.getElementById('container');
            c.innerHTML = filtered.length ? filtered.map(i => `<div class="qa-card" data-cat="${i.cat}"><div class="question">${hl(i.q, search)}</div><div class="answer">${hl(i.a, search)}</div></div>`).join('') : '<div class="no-results">No results found.</div>';
            // Apply syntax highlighting to all pre blocks
            c.querySelectorAll('pre').forEach(pre => {
                pre.innerHTML = syntaxHL(pre.innerHTML);
            });
        }
        document.getElementById('filterSelect').addEventListener('change', e => { filter = e.target.value; render(); });
        let dt; document.getElementById('searchBox').addEventListener('input', e => { clearTimeout(dt); dt = setTimeout(() => { search = e.target.value.trim(); render(); }, 200); });
        render();
    </script>
