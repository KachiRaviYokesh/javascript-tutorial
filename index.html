<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript & Angular Interview Q&A</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="app-layout">
    <!-- Left Panel - Full Screen Height -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-logo"><i class="fas fa-code"></i> Interview Prep</span>
        <div class="sidebar-actions">
          <button id="toggleAllBtn" title="Collapse All">
            <i class="fas fa-angle-double-up"></i>
          </button>
        </div>
      </div>
      <div class="sidebar-filters">
        <div class="search-wrapper">
          <i class="fas fa-search search-icon"></i>
          <input type="text" id="searchInput" placeholder="Search questions..." />
          <div class="search-options">
            <button type="button" class="search-opt" id="matchCaseBtn" title="Match Case" aria-pressed="false">Aa</button>
            <button type="button" class="search-opt" id="matchWordBtn" title="Match Whole Word" aria-pressed="false">Ab|</button>
          </div>
          <button class="search-clear" id="searchClear" title="Clear"><i class="fas fa-times"></i></button>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Right Side - Header + Content -->
    <div class="right-panel" id="rightPanel">
      <header class="header">
        <div class="header-left">
          <button class="sidebar-toggle" id="sidebarToggle" title="Toggle Sidebar">
            <i class="fas fa-bars"></i>
          </button>
        </div>
        <div class="header-filters">
          <div class="filter-group">
            <label>Topic:</label>
            <select id="topicFilter">
              <option value="all" selected>All</option>
              <option value="javascript">JavaScript</option>
              <option value="typescript">TypeScript</option>
              <option value="angular">Angular</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Level:</label>
            <select id="levelFilter">
              <option value="all">All Levels</option>
              <option value="beginner">Beginner (0-1 yr)</option>
              <option value="intermediate">Intermediate (1-2 yr)</option>
              <option value="advanced">Advanced (2+ yr)</option>
            </select>
          </div>
        </div>
        <button class="btn-bookmark-filter" id="bookmarkFilter" title="Show Bookmarked">
          <i class="far fa-bookmark"></i>
        </button>
      </header>

      <main class="content" id="content">
        <div class="qa-display" id="qaDisplay">
          <div class="qa-header">
            <span class="qa-badge" id="qaBadge"></span>
            <span class="qa-level" id="qaLevel"></span>
            <button class="btn-bookmark" id="qaBookmark" title="Bookmark">
              <i class="far fa-bookmark"></i>
            </button>
          </div>
          <h2 class="qa-question" id="qaQuestion"></h2>
          <div class="qa-answer" id="qaAnswer"></div>
        </div>
      </main>
      <div class="qa-nav" id="qaNav">
        <button class="btn-nav" id="prevBtn"><i class="fas fa-arrow-left"></i> Previous</button>
        <button class="btn-nav" id="nextBtn">Next <i class="fas fa-arrow-right"></i></button>
      </div>
    </div>
  </div>

  <script src="javascript-questions.js"></script>
  <script src="typescript-questions.js"></script>
  <script src="angular-questions.js"></script>
  <script src="script.js"></script>
</body>
</html>
