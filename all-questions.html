      { id:"ng-44", q:"What is router-outlet?", a:"router-outlet is a placeholder where routed components are displayed.", topic:"angular", level:"intermediate" },
      { id:"ng-45", q:"What is route parameter?", a:"Route parameter is used to pass dynamic values in URL. Example /user/:id.", topic:"angular", level:"intermediate" },
      { id:"ng-46", q:"What is query parameter?", a:"Query parameter is used to pass optional data in URL using ?key=value format.", topic:"angular", level:"intermediate" },
      { id:"ng-47", q:"What is lazy loading in Angular?", a:"Lazy loading loads modules only when needed. It improves performance and reduces initial load time.", topic:"angular", level:"intermediate" },
      { id:"ng-48", q:"What is preloading in Angular?", a:"Preloading loads lazy modules in background after app is loaded. It improves navigation speed.", topic:"angular", level:"intermediate" },
      { id:"ng-49", q:"What is route guard in Angular?", a:"Route guard is used to control access to routes. It can allow or block navigation.", topic:"angular", level:"intermediate" },
      { id:"ng-50", q:"What are types of route guards?", a:"Types are CanActivate, CanDeactivate, CanLoad and Resolve. They control routing behavior.", topic:"angular", level:"intermediate" },
      { id:"ng-51", q:"What is Reactive Forms in Angular?", a:"Reactive forms are model-driven forms. Form structure is defined in component using FormControl and FormGroup.", topic:"angular", level:"intermediate" },
      { id:"ng-52", q:"What is Template-driven Forms?", a:"Template-driven forms are defined in HTML template using directives like ngModel.", topic:"angular", level:"intermediate" },
      { id:"ng-53", q:"What is FormControl?", a:"FormControl represents a single form field. It tracks value and validation state.", topic:"angular", level:"intermediate" },
      { id:"ng-54", q:"What is FormGroup?", a:"FormGroup is a collection of FormControls. It represents a complete form.", topic:"angular", level:"intermediate" },
      { id:"ng-55", q:"What is FormArray?", a:"FormArray is used to manage multiple form controls dynamically in an array format.", topic:"angular", level:"intermediate" },
      { id:"ng-56", q:"What is validation in Angular forms?", a:"Validation is used to check user input. It ensures correct data is entered.", topic:"angular", level:"intermediate" },
      { id:"ng-57", q:"What are built-in validators?", a:"Built-in validators are predefined validation functions like required, minlength, maxlength and pattern.", topic:"angular", level:"intermediate" },
      { id:"ng-58", q:"What is custom validator?", a:"Custom validator is user-defined function to create custom validation logic.", topic:"angular", level:"intermediate" },
      { id:"ng-59", q:"What is async validator?", a:"Async validator is used for validation that requires server call like checking username availability.", topic:"angular", level:"intermediate" },
      { id:"ng-60", q:"What is form submission in Angular?", a:"Form submission is handled using (ngSubmit) event. It triggers method in component when form is submitted.", topic:"angular", level:"intermediate" },
      { id:"ng-61", q:"What is HttpClient in Angular?", a:"HttpClient is used to make HTTP requests like GET, POST, PUT and DELETE to communicate with server.", topic:"angular", level:"intermediate" },
      { id:"ng-62", q:"What is HttpClientModule?", a:"HttpClientModule is required to use HttpClient. It must be imported in module.", topic:"angular", level:"intermediate" },
      { id:"ng-63", q:"What is Observable in Angular?", a:"Observable is used to handle asynchronous data like API responses. It comes from RxJS.", topic:"angular", level:"intermediate" },
      { id:"ng-64", q:"What is subscribe in Angular?", a:"subscribe is used to get data from observable. Without subscribe, observable will not execute.", topic:"angular", level:"intermediate" },
      { id:"ng-65", q:"What is pipe in RxJS?", a:"pipe is used to combine multiple operators in observable. It helps to transform data.", topic:"angular", level:"intermediate" },
      { id:"ng-66", q:"What are RxJS operators?", a:"Operators are functions used to modify observable data. Examples are map, filter, switchMap.", topic:"angular", level:"intermediate" },
      { id:"ng-67", q:"What is switchMap?", a:"switchMap cancels previous observable and switches to new one. It is useful in API calls.", topic:"angular", level:"intermediate" },
      { id:"ng-68", q:"What is mergeMap?", a:"mergeMap runs multiple observables in parallel and combines results.", topic:"angular", level:"intermediate" },
      { id:"ng-69", q:"What is concatMap?", a:"concatMap executes observables one by one in order.", topic:"angular", level:"intermediate" },
      { id:"ng-70", q:"What is forkJoin?", a:"forkJoin is used to run multiple API calls and get all results together when all are completed.", topic:"angular", level:"intermediate" },
      { id:"ng-71", q:"What is Subject in RxJS?", a:"Subject is both observable and observer. It is used to share data between multiple components.", topic:"angular", level:"intermediate" },
      { id:"ng-72", q:"What is BehaviorSubject?", a:"BehaviorSubject stores latest value and sends it to new subscribers immediately.", topic:"angular", level:"intermediate" },
      { id:"ng-73", q:"What is ReplaySubject?", a:"ReplaySubject stores multiple previous values and sends them to new subscribers.", topic:"angular", level:"intermediate" },
      { id:"ng-74", q:"What is AsyncSubject?", a:"AsyncSubject sends only last value when observable completes.", topic:"angular", level:"intermediate" },
      { id:"ng-75", q:"What is difference between Subject and BehaviorSubject?", a:"Subject does not store value. BehaviorSubject stores latest value and sends to new subscribers.", topic:"angular", level:"intermediate" },
      { id:"ng-76", q:"What is unsubscribe in Angular?", a:"unsubscribe is used to stop observable execution. It prevents memory leaks.", topic:"angular", level:"intermediate" },
      { id:"ng-77", q:"What is takeUntil in RxJS?", a:"takeUntil is used to automatically unsubscribe when a condition or signal is emitted.", topic:"angular", level:"intermediate" },
      { id:"ng-78", q:"What is async pipe?", a:"async pipe automatically subscribes and unsubscribes observables in template.", topic:"angular", level:"intermediate" },
      { id:"ng-79", q:"What is error handling in Angular HTTP?", a:"Error handling is done using catchError operator in RxJS. It handles API errors properly.", topic:"angular", level:"intermediate" },
      { id:"ng-80", q:"What is interceptor in Angular?", a:"Interceptor is used to modify HTTP requests and responses globally like adding headers or logging.", topic:"angular", level:"intermediate" },
      { id:"ng-81", q:"What is Angular CLI?", a:"Angular CLI is a command line tool used to create, build and manage Angular projects easily.", topic:"angular", level:"intermediate" },
      { id:"ng-82", q:"What is ng new command?", a:"ng new is used to create a new Angular project with default setup.", topic:"angular", level:"intermediate" },
      { id:"ng-83", q:"What is ng serve?", a:"ng serve is used to run Angular application locally with development server.", topic:"angular", level:"intermediate" },
      { id:"ng-84", q:"What is ng build?", a:"ng build is used to compile Angular project into output files for deployment.", topic:"angular", level:"intermediate" },
      { id:"ng-85", q:"What is ng generate?", a:"ng generate is used to create components, services, modules and other files quickly.", topic:"angular", level:"intermediate" },
      { id:"ng-86", q:"What is ng add?", a:"ng add is used to add external libraries or packages into Angular project.", topic:"angular", level:"intermediate" },
      { id:"ng-87", q:"What is ng test?", a:"ng test is used to run unit tests for Angular application.", topic:"angular", level:"intermediate" },
      { id:"ng-88", q:"What is ng lint?", a:"ng lint is used to check code quality and style issues in Angular project.", topic:"angular", level:"intermediate" },
      { id:"ng-89", q:"What is environment file in Angular?", a:"Environment files store configuration for different environments like development and production.", topic:"angular", level:"intermediate" },
      { id:"ng-90", q:"What is angular.json file?", a:"angular.json contains project configuration like build, serve and file paths.", topic:"angular", level:"intermediate" },
      { id:"ng-91", q:"What is Angular Signals?", a:"Signals are a new reactive feature in Angular. They track state changes and update UI automatically.", topic:"angular", level:"intermediate" },
      { id:"ng-92", q:"Why Angular Signals are used?", a:"Signals are used to manage state in simple way. They reduce need of manual change detection and improve performance.", topic:"angular", level:"intermediate" },
      { id:"ng-93", q:"What is signal() function?", a:"signal() is used to create a reactive value. It stores state and updates UI when value changes.", topic:"angular", level:"intermediate" },
      { id:"ng-94", q:"What is computed() in Angular Signals?", a:"computed() is used to create derived values from signals. It updates automatically when dependency changes.", topic:"angular", level:"intermediate" },
      { id:"ng-95", q:"What is effect() in Angular Signals?", a:"effect() runs side effects when signal value changes. It is used for logging or API calls.", topic:"angular", level:"intermediate" },
      { id:"ng-96", q:"What is difference between Signals and RxJS?", a:"Signals are simple and synchronous. RxJS is powerful and handles complex async streams.", topic:"angular", level:"intermediate" },
      { id:"ng-97", q:"When to use Signals vs RxJS?", a:"Use Signals for simple state management. Use RxJS for async operations like API calls and streams.", topic:"angular", level:"intermediate" },
      { id:"ng-98", q:"What is standalone component in Angular?", a:"Standalone component does not need NgModule. It can be used directly with imports array.", topic:"angular", level:"intermediate" },
      { id:"ng-99", q:"What is bootstrapApplication?", a:"bootstrapApplication is used to start Angular app without NgModule in standalone approach.", topic:"angular", level:"intermediate" },
      { id:"ng-100", q:"What is provideRouter in Angular?", a:"provideRouter is used to configure routing in standalone applications.", topic:"angular", level:"intermediate" },
      { id:"ng-101", q:"What is state management in Angular?", a:"State management is used to manage and share data across components in a structured way.", topic:"angular", level:"advanced" },
      { id:"ng-102", q:"What are different state management options in Angular?", a:"Options include services with RxJS, BehaviorSubject, Signals and libraries like NgRx.", topic:"angular", level:"advanced" },
      { id:"ng-103", q:"What is NgRx?", a:"NgRx is a state management library for Angular. It uses Redux pattern with store, actions and reducers.", topic:"angular", level:"advanced" },
      { id:"ng-104", q:"What is store in NgRx?", a:"Store holds application state. It is a single source of truth.", topic:"angular", level:"advanced" },
      { id:"ng-105", q:"What are actions in NgRx?", a:"Actions are events that describe what happened. They are used to update state.", topic:"angular", level:"advanced" },
      { id:"ng-106", q:"What are reducers in NgRx?", a:"Reducers are functions that take current state and action, and return new state.", topic:"angular", level:"advanced" },
      { id:"ng-107", q:"What are effects in NgRx?", a:"Effects handle side effects like API calls. They listen to actions and perform async tasks.", topic:"angular", level:"advanced" },
      { id:"ng-108", q:"What are selectors in NgRx?", a:"Selectors are used to select specific data from store.", topic:"angular", level:"advanced" },
      { id:"ng-109", q:"What is Entity in NgRx?", a:"Entity is used to manage collections of data in efficient way like arrays of objects.", topic:"angular", level:"advanced" },
      { id:"ng-110", q:"What is SignalStore (NgRx Signals)?", a:"SignalStore is new approach using Angular signals for state management in NgRx.", topic:"angular", level:"advanced" },
      { id:"ng-111", q:"What is performance optimization in Angular?", a:"Performance optimization means improving speed and efficiency of Angular app.", topic:"angular", level:"advanced" },
      { id:"ng-112", q:"How to improve Angular performance?", a:"Use OnPush change detection, lazy loading, trackBy in ngFor, pure pipes and avoid unnecessary API calls.", topic:"angular", level:"advanced" },
      { id:"ng-113", q:"What is trackBy in Angular?", a:"trackBy is used with ngFor to track items by unique id. It improves performance by reducing DOM updates.", topic:"angular", level:"advanced" },
      { id:"ng-114", q:"What is Ahead-of-Time (AOT) compilation?", a:"AOT compiles Angular code during build time. It improves performance and reduces bundle size.", topic:"angular", level:"advanced" },

    ];

    const TOTAL = ALL_QUESTIONS.length;
    const TOPIC_LABELS = { javascript: 'JavaScript', typescript: 'TypeScript', angular: 'Angular' };
    const LEVEL_LABELS = { beginner: 'Beginner', intermediate: 'Intermediate', advanced: 'Advanced' };
    const TOPIC_ORDER = ['javascript', 'typescript', 'angular'];

    const topicFilter = document.getElementById('topicFilter');
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearBtn');
    const content = document.getElementById('content');

    let debounceTimer;

    topicFilter.addEventListener('change', render);
    searchInput.addEventListener('input', () => {
      clearBtn.classList.toggle('visible', searchInput.value.length > 0);
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(render, 200);
    });
    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      clearBtn.classList.remove('visible');
      searchInput.focus();
      render();
    });

    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function highlightText(text, re) {
      if (!re) return escapeHtml(text);
      const g = new RegExp(re.source, re.flags.includes('g') ? re.flags : re.flags + 'g');
      let out = '', last = 0, m;
      while ((m = g.exec(text)) !== null) {
        if (!m[0].length) { g.lastIndex++; continue; }
        out += escapeHtml(text.slice(last, m.index)) + '<mark class="hit">' + escapeHtml(m[0]) + '</mark>';
        last = m.index + m[0].length;
      }
      return out + escapeHtml(text.slice(last));
    }

    function render() {
      const topic = topicFilter.value;
      const raw = searchInput.value.trim();
      let matcher = null;
      if (raw) {
        try { matcher = new RegExp(raw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'i'); } catch(e) {}
      }

      let filtered = ALL_QUESTIONS;
      if (topic !== 'all') filtered = filtered.filter(q => q.topic === topic);
      if (matcher) filtered = filtered.filter(q => matcher.test(q.q) || matcher.test(q.a));

      content.innerHTML = '';

      if (!filtered.length) {
        content.innerHTML = '<div class="no-results">No questions match your filters.</div>';
        return;
      }

      const groups = {};
      filtered.forEach(q => {
        const key = q.topic;
        if (!groups[key]) groups[key] = [];
        groups[key].push(q);
      });

      let num = 0;
      TOPIC_ORDER.forEach(t => {
        if (!groups[t]) return;
        const section = document.createElement('div');
        section.className = 'topic-section';

        const heading = document.createElement('div');
        heading.className = 'topic-heading ' + t;
        heading.innerHTML = '<span class="dot"></span> ' + TOPIC_LABELS[t] + ' (' + groups[t].length + ')';
        section.appendChild(heading);

        groups[t].forEach(q => {
          num++;
          const card = document.createElement('div');
          card.className = 'qa-card';

          const header = document.createElement('div');
          header.className = 'qa-card-header';
          header.innerHTML =
            '<span class="qa-num">' + num + '.</span>' +
            '<span class="qa-q">' + highlightText(q.q, matcher) + '</span>' +
            '<span class="qa-badges">' +
              '<span class="badge ' + q.level + '">' + LEVEL_LABELS[q.level] + '</span>' +
            '</span>' +
            '';

          const answer = document.createElement('div');
          answer.className = 'qa-answer';
          answer.innerHTML = highlightText(q.a, matcher);

          card.appendChild(header);
          card.appendChild(answer);
          section.appendChild(card);
        });

        content.appendChild(section);
      });
    }

    render();
  })();
  </script>
